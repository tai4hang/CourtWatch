version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: startup-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_TYPE=oracle
      - PAR_URL=https://objectstorage.us-ashburn-1.oraclecloud.com/p/h7c9OmsOy_f2rvLhXHvK_gVjmTNlzEZRbYaq30whtlXM-dRu0Lj4JgCscsR0Yv0X/n/idvt8mwxkdbc/b/db-wallets/o/Wallet_UB3AK3MTVBQJS41L.zip
      - OCI_SECRET_ORACLE_USER=${OCI_SECRET_ORACLE_USER}
      - OCI_SECRET_ORACLE_PASSWORD=${OCI_SECRET_ORACLE_PASSWORD}
      - OCI_SECRET_ORACLE_CONNECT_STRING=${OCI_SECRET_ORACLE_CONNECT_STRING}
      - OCI_SECRET_ORACLE_WALLET_PASSWORD=${OCI_SECRET_ORACLE_WALLET_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=${POSTHOG_HOST}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    restart: unless-stopped
    networks:
      - app-network

  # Redis for caching/sessions
  redis:
    image: redis:7-alpine
    container_name: startup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge