version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: startup-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ORACLE_USER=${ORACLE_USER}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_CONNECT_STRING=${ORACLE_CONNECT_STRING}
      - ORACLE_WALLET_LOCATION=/app/wallet
      - ORACLE_WALLET_PASSWORD=${ORACLE_WALLET_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=${POSTHOG_HOST}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - ./wallet:/app/wallet:ro
    restart: unless-stopped
    networks:
      - app-network

  # Redis for caching/sessions
  redis:
    image: redis:7-alpine
    container_name: startup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: startup-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge