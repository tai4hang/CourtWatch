version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: startup-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=${POSTHOG_HOST}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network

  # Oracle AI DB (using Oracle Express for dev)
  db:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: startup-db
    environment:
      - ORACLE_PWD=${ORACLE_PASSWORD:-OraclePass123}
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
    restart: unless-stopped
    networks:
      - app-network

  # Redis for caching/sessions
  redis:
    image: redis:7-alpine
    container_name: startup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: startup-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

volumes:
  oracle-data:
  redis-data:

networks:
  app-network:
    driver: bridge
