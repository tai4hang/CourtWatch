name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'database/**'

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/startup-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Oracle Cloud CLI
        run: |
          curl -LO https://github.com/oracle/oci-cli/releases/latest/download/oci-cli.zip
          unzip -o oci-cli.zip -d /opt
          export PATH=$PATH:/opt/oracle-cli/bin
          /opt/oracle-cli/bin/oci --version

      - name: Configure OCI
        run: |
          /opt/oracle-cli/bin/oci config set --profile-name DEFAULT \
            --config-file /tmp/oci_config \
            --session-auth "instance_principal"
        env:
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_CLI_USER: ${{ secrets.OCI_USER }}

      - name: Deploy to Oracle Container Instance
        run: |
          # This would deploy using OCI CLI or kubectl
          echo "Deploying to Oracle Cloud..."
          # oci container instance create ...