name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCI Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Generate tags
        id: vars
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.OCI_REGISTRY }}/courtwatch:latest
            ${{ secrets.OCI_REGISTRY }}/courtwatch:${{ steps.vars.outputs.tag }}
            ${{ secrets.OCI_REGISTRY }}/courtwatch:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max