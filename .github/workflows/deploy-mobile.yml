name: Deploy Mobile

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  release:
    types: [published]

jobs:
  build-ios:
    name: Build iOS (TestFlight)
    runs-on: macos-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Initialize EAS project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas init --non-interactive || true

      - name: Prebuild iOS
        run: |
          cd mobile
          npx expo prebuild --platform ios --clean

      - name: Build iOS with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd mobile
          eas build --platform ios --profile preview --non-interactive

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          # Get build ID from previous step or list builds
          BUILD_ID=$(eas build:list --platform ios --limit 1 --json | jq -r '.[0].id')
          if [ -n "$BUILD_ID" ]; then
            eas submit --platform ios --id $BUILD_ID --non-interactive
          fi

  build-android:
    name: Build Android (Play Store)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Initialize EAS project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas init --non-interactive || true

      - name: Prebuild Android
        run: |
          cd mobile
          npx expo prebuild --platform android --clean

      - name: Build Android with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform android --profile preview --non-interactive

      - name: Submit to Play Store (Internal Testing)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          BUILD_ID=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')
          if [ -n "$BUILD_ID" ]; then
            eas submit --platform android --id $BUILD_ID --non-interactive
          fi

  release-build:
    name: Release Build (on Tag)
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Initialize EAS project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas init --non-interactive || true

      - name: Prebuild iOS
        run: |
          cd mobile
          npx expo prebuild --platform ios --clean

      - name: Build iOS Release
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd mobile
          eas build --platform ios --profile production --non-interactive

      - name: Submit to TestFlight for Beta Review
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          # Auto-submit after build
          eas submit --platform ios --profile production --non-interactive